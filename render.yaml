services:
  - type: web
    name: adslands-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js

  - type: web
    name: adslands-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
